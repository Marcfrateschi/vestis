<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#f5f0e6" />
    <title>VESTIS — Your wardrobe, intelligent</title>
    <meta name="description" content="AI-powered wardrobe and personal styling. Photograph your clothes, get styled, pack smart for any trip." />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />

    <!-- iOS-specific -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="VESTIS" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- Splash screens for iOS -->
    <link rel="apple-touch-startup-image" href="/splash-iphone-12-13-14.png"
      media="(device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3)" />
    <link rel="apple-touch-startup-image" href="/splash-iphone-pro-max.png"
      media="(device-width: 428px) and (device-height: 926px) and (-webkit-device-pixel-ratio: 3)" />

    <!-- Favicons -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
    <link rel="icon" href="/favicon-32.png" />

    <script>
      // Register service worker for offline support
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("/service-worker.js").catch(() => {
            // Silent fail — app works without it
          });
        });
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
